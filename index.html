<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MrVision</title>
    <link rel="stylesheet" href="/src/styles/main.css" />
  </head>
  <body>
    <div id="app">
      <header class="header">
        <div class="header-left">
          <h1 class="logo">MrVision</h1>
          <span class="subtitle">Client-side OCR for images &amp; PDFs</span>
        </div>
        <button id="theme-toggle" class="icon-btn" title="Toggle theme" aria-label="Toggle theme">
          <span class="theme-icon">&#9790;</span>
        </button>
      </header>

      <main class="main">
        <!-- Drop Zone -->
        <section id="drop-zone" class="drop-zone">
          <div class="drop-zone-content">
            <div class="drop-icon">&#128196;</div>
            <p class="drop-text">Drop images or PDFs here, or click to browse</p>
            <p class="drop-hint">Supports PNG, JPG, TIFF, BMP, WebP, PDF</p>
            <input type="file" id="file-input" accept=".pdf,.png,.jpg,.jpeg,.tiff,.tif,.bmp,.webp" multiple hidden />
          </div>
          <div id="file-info" class="file-info hidden">
            <ul id="file-list" class="file-list"></ul>
            <button id="clear-file" class="icon-btn" title="Clear files">&times;</button>
          </div>
        </section>

        <!-- Options Panel -->
        <section id="options-panel" class="options-panel hidden">
          <div id="hw-status" class="hw-status"></div>
          <div class="option-row">
            <label for="engine-select">OCR Engine</label>
            <select id="engine-select">
              <option value="auto" selected>Auto (best available)</option>
              <option value="cpu">CPU (Tesseract WASM)</option>
              <option value="gpu">GPU (WebGPU)</option>
              <option value="npu">NPU / Neural Engine (WebNN)</option>
            </select>
          </div>
          <div class="option-row">
            <label for="lang-select">Language</label>
            <select id="lang-select">
              <option value="eng" selected>English</option>
              <option value="deu">German</option>
              <option value="fra">French</option>
              <option value="spa">Spanish</option>
              <option value="ita">Italian</option>
              <option value="por">Portuguese</option>
              <option value="nld">Dutch</option>
              <option value="ara">Arabic</option>
              <option value="chi_sim">Chinese (Simplified)</option>
              <option value="chi_tra">Chinese (Traditional)</option>
              <option value="jpn">Japanese</option>
              <option value="kor">Korean</option>
              <option value="rus">Russian</option>
            </select>
          </div>
          <div id="dpi-option" class="option-row">
            <label for="dpi-select">Output DPI</label>
            <select id="dpi-select">
              <option value="150" selected>150 (fast, low memory)</option>
              <option value="300">300 (higher quality, more memory)</option>
            </select>
          </div>
          <div id="downsample-option" class="option-row">
            <label for="downsample-check">
              <input type="checkbox" id="downsample-check" checked />
              Downsample output
            </label>
          </div>
          <div id="preprocess-option" class="option-row">
            <label for="preprocess-check">
              <input type="checkbox" id="preprocess-check" />
              Enhance images before OCR (grayscale + contrast)
            </label>
          </div>
          <button id="start-btn" class="btn-primary">Start OCR</button>
        </section>

        <!-- Progress Section -->
        <section id="progress-section" class="progress-section hidden">
          <div id="batch-status" class="batch-status hidden"></div>
          <div class="progress-header">
            <span id="progress-step" class="progress-step">Initializing...</span>
            <span id="progress-time" class="progress-time">0s</span>
          </div>
          <div class="progress-bar-track">
            <div id="progress-bar" class="progress-bar" style="width: 0%"></div>
          </div>
          <div id="progress-percent" class="progress-percent">0%</div>
          <div id="page-grid" class="page-grid"></div>
          <div id="log" class="log"></div>
          <button id="cancel-btn" class="btn-cancel">Cancel</button>
        </section>

        <!-- Results Section -->
        <section id="results-section" class="results-section hidden">
          <h2>Results</h2>
          <!-- One result card is appended here per processed file -->
          <div id="result-list" class="result-list"></div>
          <button id="download-all-btn" class="btn-primary hidden">Download all PDFs</button>
          <button id="reset-btn" class="btn-secondary">Process more files</button>
        </section>
      </main>

      <section id="offline-section" class="offline-section hidden">
        <div class="offline-row">
          <span id="cache-status" class="cache-status"></span>
          <button id="cache-btn" class="btn-secondary">Download for offline use</button>
        </div>
      </section>

      <footer class="footer">
        <p>All processing happens in your browser. Your files never leave your device.</p>
      </footer>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
